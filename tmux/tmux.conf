# Prefix: Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix
# General
set -g base-index 1
set -g escape-time 0
set -g renumber-windows on
set -g default-terminal "screen-256color"
set -g history-limit 10000
# Vi mode
setw -g mode-keys vi
# Mouse on
set -g mouse on
# Reload config
bind r source-file ~/.tmux.conf \; display "Reloaded tmux config."
# Better split mnemonics (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# New window in current path
bind j new-window -c "#{pane_current_path}"
# Window switching
bind -r p previous-window
bind -r n next-window
bind -n S-Left swap-window -t -1 \; previous-window
bind -n S-Right swap-window -t +1 \; next-window
bind -r , command-prompt "rename-window %%"
# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
# Smart pane switching with vim awareness
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n C-\\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"
# Paste
bind P paste-buffer
# Status bar
set -g status-interval 5
set -g status-bg default
set -g status-fg colour244
set -g window-status-current-style fg=colour255,bold
set -g automatic-rename on
set-option -g visual-activity on
